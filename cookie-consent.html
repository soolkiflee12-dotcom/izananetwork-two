<div
  id="cookieBar"
  class="fixed inset-x-0 bottom-0 z-[60] hidden"
  role="dialog"
  aria-live="polite"
  aria-label="Cookie consent"
>
  <div class="mx-auto max-w-7xl px-4 sm:px-6 pb-4">
    <div
      class="rounded-2xl border border-gray-200/80 dark:border-gray-800 bg-white/95 dark:bg-gray-950/90 backdrop-blur-md shadow-lg"
    >
      <div class="p-4 sm:p-5 flex flex-col sm:flex-row sm:items-center gap-3 sm:gap-4">
        <div class="flex-1">
          <p class="text-sm font-semibold text-gray-900 dark:text-gray-100">
            เว็บไซต์นี้ใช้คุกกี้
          </p>
          <p class="mt-1 text-xs sm:text-sm text-gray-600 dark:text-gray-300">
            เราใช้คุกกี้เพื่อปรับปรุงประสบการณ์การใช้งาน วิเคราะห์การใช้งาน และการตลาด
            คุณสามารถเลือกตั้งค่าคุกกี้ได้
            <a
              href="/privacy-policy"
              class="underline underline-offset-2 hover:text-blue-600 dark:hover:text-blue-300"
            >อ่านนโยบาย</a>
          </p>
        </div>

        <div class="flex flex-col sm:flex-row gap-2 sm:gap-3 sm:items-center">
          <button
            type="button"
            id="cookieSettingsBtn"
            class="px-4 py-2 rounded-full text-sm font-semibold
                   bg-white dark:bg-gray-900/60
                   border border-gray-200 dark:border-gray-800
                   hover:bg-gray-50 dark:hover:bg-gray-900 transition"
          >
            ตั้งค่า
          </button>

          <a
            href="/privacy-policy"
            class="px-4 py-2 rounded-full text-sm font-semibold text-center
                   bg-white dark:bg-gray-900/60
                   border border-gray-200 dark:border-gray-800
                   hover:bg-gray-50 dark:hover:bg-gray-900 transition"
          >
            ดูนโยบาย
          </a>

          <button
            type="button"
            id="cookieAcceptBtn"
            class="px-5 py-2 rounded-full text-sm font-semibold text-white
                   bg-gradient-to-r from-blue-500 to-purple-500
                   hover:opacity-95 transition"
          >
            ยอมรับทั้งหมด
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<div
  id="cookieModal"
  class="fixed inset-0 z-[70] hidden"
  role="dialog"
  aria-modal="true"
  aria-label="Cookie settings"
>
  <div class="absolute inset-0 bg-black/40"></div>

  <div class="relative mx-auto max-w-lg px-4 sm:px-6 mt-24">
    <div class="rounded-2xl bg-white dark:bg-gray-950 border border-gray-200 dark:border-gray-800 shadow-xl">
      <div class="p-5">
        <div class="flex items-start justify-between gap-3">
          <div>
            <h3 class="text-lg font-bold text-gray-900 dark:text-gray-100">
              ตั้งค่าคุกกี้
            </h3>
            <p class="mt-1 text-sm text-gray-600 dark:text-gray-300">
              เลือกประเภทคุกกี้ที่คุณยินยอมให้ใช้งาน
            </p>
          </div>

          <button
            type="button"
            id="cookieCloseModal"
            class="h-9 w-9 rounded-full border border-gray-200 dark:border-gray-800
                   hover:bg-gray-100 dark:hover:bg-gray-900 transition"
            aria-label="Close"
          >✕</button>
        </div>

        <div class="mt-4 space-y-3">
          <label class="flex items-center justify-between gap-3 p-3 rounded-xl border border-gray-200 dark:border-gray-800">
            <div>
              <p class="text-sm font-semibold">คุกกี้จำเป็น</p>
              <p class="text-xs text-gray-500 dark:text-gray-400">จำเป็นต่อการทำงานของเว็บไซต์ (เปิดเสมอ)</p>
            </div>
            <input type="checkbox" checked disabled class="h-4 w-4" />
          </label>

          <label class="flex items-center justify-between gap-3 p-3 rounded-xl border border-gray-200 dark:border-gray-800">
            <div>
              <p class="text-sm font-semibold">คุกกี้วิเคราะห์</p>
              <p class="text-xs text-gray-500 dark:text-gray-400">ช่วยให้เราปรับปรุงบริการ</p>
            </div>
            <input id="cookieAnalytics" type="checkbox" class="h-4 w-4" />
          </label>

          <label class="flex items-center justify-between gap-3 p-3 rounded-xl border border-gray-200 dark:border-gray-800">
            <div>
              <p class="text-sm font-semibold">คุกกี้การตลาด</p>
              <p class="text-xs text-gray-500 dark:text-gray-400">เพื่อการแสดงโฆษณา/ข้อเสนอที่เหมาะสม</p>
            </div>
            <input id="cookieMarketing" type="checkbox" class="h-4 w-4" />
          </label>
        </div>

        <div class="mt-5 flex flex-col sm:flex-row gap-2 sm:justify-end">
          <button
            type="button"
            id="cookieRejectBtn"
            class="px-4 py-2 rounded-full text-sm font-semibold
                   bg-white dark:bg-gray-900/60
                   border border-gray-200 dark:border-gray-800
                   hover:bg-gray-50 dark:hover:bg-gray-900 transition"
          >
            ปฏิเสธ (ไม่จำเป็น)
          </button>

          <button
            type="button"
            id="cookieSaveBtn"
            class="px-5 py-2 rounded-full text-sm font-semibold text-white
                   bg-gradient-to-r from-blue-500 to-purple-500
                   hover:opacity-95 transition"
          >
            บันทึกการตั้งค่า
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
