<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<title>Navbar Responsive</title>

<script>
function toggleDark(){
  document.documentElement.classList.toggle("dark")
}
</script>

</head>

<body class="bg-gray-50 dark:bg-gray-900">

<!-- NAVBAR -->
<div class="fixed top-0 left-0 w-full z-50 bg-white/80 dark:bg-gray-950/70 backdrop-blur-md border-b border-gray-200/70 dark:border-gray-800">

<header class="max-w-7xl mx-auto flex items-center justify-between px-4 py-2">

<!-- LOGO -->
<a href="/" class="flex items-center gap-3">
  <img 
    src="../images/logo.png"
    alt="IZANA TRUE"
    class="h-10 sm:h-20 w-auto drop-shadow-sm"
    decoding="async"
  />
</a>

<div class="flex items-center gap-4">

<!-- DESKTOP MENU -->
<nav class="hidden md:flex gap-6 font-medium">
<a href="/" class="hover:text-blue-500 transition">หน้าแรก</a>
<a href="/contact" class="hover:text-blue-500 transition">ติดต่อเรา</a>
</nav>

<!-- DARK MODE -->
<button
onclick="toggleDark()"
class="inline-flex items-center justify-center h-9 w-9 rounded-full border border-gray-200 dark:border-gray-800 hover:bg-gray-100 dark:hover:bg-gray-900"
>
<span>🌙</span>
</button>

<!-- MOBILE MENU BUTTON -->
<button id="menuBtn" class="md:hidden text-2xl">
☰
</button>

</div>

</header>

<!-- MOBILE MENU -->
<div id="mobileMenu" class="hidden md:hidden px-6 pb-4 space-y-3 font-medium">

<a href="/" class="block py-2 border-b border-gray-200 dark:border-gray-800">
หน้าแรก
</a>

<a href="/contact" class="block py-2">
ติดต่อเรา
</a>

</div>

</div>

<!-- CONTENT TEST
<div class="pt-24 text-center text-gray-700 dark:text-gray-200">
<h1 class="text-3xl font-bold">Test Page</h1>
<p>ลองกดปุ่ม ☰ บนมือถือ</p>
</div> -->

<!-- JAVASCRIPT -->
<script>

const menuBtn = document.getElementById("menuBtn");
const mobileMenu = document.getElementById("mobileMenu");

menuBtn.addEventListener("click", function(){
  mobileMenu.classList.toggle("hidden");
});

</script>

</body>
</html>
